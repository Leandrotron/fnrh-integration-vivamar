<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in - Pousada Viva Mar</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    img.logo {
      max-width: 220px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 10px 0 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    .field {
      margin-top: 10px;
      text-align: left;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #444;
    }

    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: #007BFF;
      box-shadow: 0 0 0 3px rgba(0,123,255,0.12);
    }

    input.valid {
      border-color: #28a745;
      background: #f6fff8;
    }

    input.invalid {
      border-color: #dc3545;
      background: #fff8f8;
    }

    .field-note {
      margin-top: 5px;
      font-size: 12px;
      color: #666;
      min-height: 14px;
    }

    .field-note.error {
      color: #dc3545;
    }

    .field-note.success {
      color: #28a745;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .info-box {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      text-align: left;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" class="logo" alt="Pousada Viva Mar">

    <h2>Finalize seu check-in</h2>
    <div class="subtitle">Leva menos de 2 minutos 😊</div>

    <div id="info" class="info-box hidden"></div>

    <div id="reservation_fields">
      <div class="field">
        <label for="reservation_id">ID da reserva</label>
        <input id="reservation_id" placeholder="ID da reserva">
      </div>

      <div class="field">
        <label for="sub_reservation_id">ID da suíte</label>
        <input id="sub_reservation_id" placeholder="ID da suíte">
        <div class="field-note">Se houver só 1 suíte, pode repetir o mesmo número da reserva.</div>
      </div>
    </div>

    <div class="field">
      <label for="full_name">Nome completo</label>
      <input id="full_name" placeholder="Nome completo">
      <div id="full_name_note" class="field-note"></div>
    </div>

    <div class="field">
      <label for="cpf">CPF</label>
      <input id="cpf" placeholder="000.000.000-00" maxlength="14">
      <div id="cpf_note" class="field-note"></div>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" placeholder="Email">
      <div id="email_note" class="field-note"></div>
    </div>

    <div class="field">
      <label for="phone">Telefone</label>
      <input id="phone" placeholder="(12) 99999-9999" maxlength="15">
      <div id="phone_note" class="field-note"></div>
    </div>

    <div class="field">
      <label for="birth_date">Data de nascimento</label>
      <input id="birth_date" type="date">
      <div id="birth_date_note" class="field-note"></div>
    </div>

    <button onclick="enviar()">Finalizar check-in</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    function getParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        rid: p.get("rid"),
        srid: p.get("srid")
      };
    }

    function onlyDigits(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function formatCPF(value) {
      const digits = onlyDigits(value).slice(0, 11);
      return digits
        .replace(/^(\d{3})(\d)/, "$1.$2")
        .replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3")
        .replace(/\.(\d{3})(\d)/, ".$1-$2");
    }

    function formatPhone(value) {
      const digits = onlyDigits(value).slice(0, 11);

      if (digits.length <= 10) {
        return digits
          .replace(/^(\d{2})(\d)/, "($1) $2")
          .replace(/(\d{4})(\d)/, "$1-$2");
      }

      return digits
        .replace(/^(\d{2})(\d)/, "($1) $2")
        .replace(/(\d{5})(\d)/, "$1-$2");
    }

    function isValidCPF(cpf) {
      cpf = onlyDigits(cpf);

      if (!cpf || cpf.length !== 11) return false;
      if (/^(\d)\1{10}$/.test(cpf)) return false;

      let sum = 0;
      for (let i = 0; i < 9; i++) {
        sum += Number(cpf.charAt(i)) * (10 - i);
      }

      let firstDigit = 11 - (sum % 11);
      if (firstDigit >= 10) firstDigit = 0;
      if (firstDigit !== Number(cpf.charAt(9))) return false;

      sum = 0;
      for (let i = 0; i < 10; i++) {
        sum += Number(cpf.charAt(i)) * (11 - i);
      }

      let secondDigit = 11 - (sum % 11);
      if (secondDigit >= 10) secondDigit = 0;
      if (secondDigit !== Number(cpf.charAt(10))) return false;

      return true;
    }

    function isValidEmail(email) {
      if (!email) return true;
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function applyFieldState(inputId, noteId, type, message) {
      const input = document.getElementById(inputId);
      const note = document.getElementById(noteId);

      input.classList.remove("valid", "invalid");
      note.classList.remove("error", "success");
      note.textContent = "";

      if (type === "valid") {
        input.classList.add("valid");
        note.classList.add("success");
        note.textContent = message || "";
      }

      if (type === "invalid") {
        input.classList.add("invalid");
        note.classList.add("error");
        note.textContent = message || "";
      }
    }

    function validateFullName() {
      const value = document.getElementById("full_name").value.trim();

      if (!value) {
        applyFieldState("full_name", "full_name_note", "", "");
        return false;
      }

      if (value.split(/\s+/).length < 2) {
        applyFieldState("full_name", "full_name_note", "invalid", "Digite nome e sobrenome.");
        return false;
      }

      applyFieldState("full_name", "full_name_note", "valid", "Nome ok.");
      return true;
    }

    function validateCPF() {
      const value = document.getElementById("cpf").value.trim();

      if (!value) {
        applyFieldState("cpf", "cpf_note", "", "");
        return false;
      }

      if (!isValidCPF(value)) {
        applyFieldState("cpf", "cpf_note", "invalid", "CPF inválido.");
        return false;
      }

      applyFieldState("cpf", "cpf_note", "valid", "CPF válido.");
      return true;
    }

    function validateEmail() {
      const value = document.getElementById("email").value.trim();

      if (!value) {
        applyFieldState("email", "email_note", "", "");
        return true;
      }

      if (!isValidEmail(value)) {
        applyFieldState("email", "email_note", "invalid", "Email inválido.");
        return false;
      }

      applyFieldState("email", "email_note", "valid", "Email ok.");
      return true;
    }

    function validatePhone() {
      const value = onlyDigits(document.getElementById("phone").value);

      if (!value) {
        applyFieldState("phone", "phone_note", "", "");
        return true;
      }

      if (value.length < 10 || value.length > 11) {
        applyFieldState("phone", "phone_note", "invalid", "Telefone incompleto.");
        return false;
      }

      applyFieldState("phone", "phone_note", "valid", "Telefone ok.");
      return true;
    }

    function validateBirthDate() {
      const value = document.getElementById("birth_date").value;

      if (!value) {
        applyFieldState("birth_date", "birth_date_note", "", "");
        return true;
      }

      applyFieldState("birth_date", "birth_date_note", "valid", "Data ok.");
      return true;
    }

    function aplicarParametros() {
      const { rid, srid } = getParams();

      if (rid) {
        document.getElementById("reservation_id").value = rid;
      }

      if (srid) {
        document.getElementById("sub_reservation_id").value = srid;
      }

      if (rid || srid) {
        document.getElementById("reservation_fields").style.display = "none";

        document.getElementById("info").classList.remove("hidden");
        document.getElementById("info").innerHTML = `
          <strong>Reserva:</strong> ${rid || "-"}<br>
          <strong>Suíte:</strong> ${srid || rid || "-"}
        `;
      }
    }

    document.getElementById("cpf").addEventListener("input", (e) => {
      e.target.value = formatCPF(e.target.value);
      validateCPF();
    });

    document.getElementById("phone").addEventListener("input", (e) => {
      e.target.value = formatPhone(e.target.value);
      validatePhone();
    });

    document.getElementById("full_name").addEventListener("blur", validateFullName);
    document.getElementById("email").addEventListener("blur", validateEmail);
    document.getElementById("birth_date").addEventListener("change", validateBirthDate);

    async function enviar() {
      const reservation_id = document.getElementById("reservation_id").value.trim();
      const sub_reservation_id = document.getElementById("sub_reservation_id").value.trim();
      const full_name = document.getElementById("full_name").value.trim();
      const cpf = document.getElementById("cpf").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const birth_date = document.getElementById("birth_date").value.trim();

      const status = document.getElementById("status");

      const validName = validateFullName();
      const validCpf = validateCPF();
      const validEmail = validateEmail();
      const validPhone = validatePhone();
      const validBirthDate = validateBirthDate();

      if (!reservation_id || !full_name || !cpf) {
        status.innerHTML = "<span style='color:red'>Preencha os campos obrigatórios.</span>";
        return;
      }

      if (!validName || !validCpf || !validEmail || !validPhone || !validBirthDate) {
        status.innerHTML = "<span style='color:red'>Corrija os campos destacados antes de continuar.</span>";
        return;
      }

      try {
        const data = {
          reservation_id,
          sub_reservation_id,
          full_name,
          cpf,
          email,
          phone,
          birth_date
        };

        const res = await fetch("http://localhost:3000/checkin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const json = await res.json();

        if (!res.ok) {
          status.innerHTML = "<span style='color:red'>" + json.error + "</span>";
          return;
        }

        status.innerHTML = "<span style='color:green'>Check-in realizado com sucesso!</span>";
      } catch (e) {
        console.error(e);
        status.innerHTML = "<span style='color:red'>Erro ao enviar.</span>";
      }
    }

    aplicarParametros();
  </script>
</body>
</html>

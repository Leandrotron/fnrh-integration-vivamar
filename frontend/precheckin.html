<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pré-check-in - Pousada Viva Mar</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      padding: 24px;
    }

    .logo {
      max-width: 220px;
      display: block;
      margin: 0 auto 12px;
    }

    h1 {
      margin: 0 0 6px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .info-box,
    .guest-box {
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .guest-box h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #444;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    .field-note {
      margin-top: 4px;
      font-size: 12px;
      color: #666;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
      background: #28a745;
    }

    button:hover {
      background: #218838;
    }

    button:disabled {
      background: #9aa4af;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #007BFF;
    }

    .secondary-btn:hover {
      background: #0056b3;
    }

    .danger-btn {
      background: #dc3545;
    }

    .danger-btn:hover {
      background: #bd2130;
    }

    .status {
      min-height: 18px;
      margin-top: 14px;
      font-size: 14px;
    }

    .summary-box {
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-top: 14px;
    }

    .summary-box h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .summary-total {
      font-size: 14px;
      color: #444;
      margin-bottom: 10px;
    }

    .summary-list {
      margin: 0;
      padding-left: 18px;
      color: #222;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" class="logo" alt="Pousada Viva Mar">

    <h1>Pré-check-in</h1>
    <div class="subtitle">Preencha os dados da sua hospedagem</div>

    <div id="stayInfo" class="info-box">Carregando dados da stay...</div>

    <div id="guestList"></div>

    <div class="actions">
      <button id="addGuestBtn" class="secondary-btn" type="button">Adicionar hóspede</button>
      <button id="submitBtn" type="button">Enviar pré-check-in</button>
    </div>

    <div id="status" class="status"></div>

    <div id="submittedSummary" class="summary-box" style="display:none;">
      <h3 id="submittedSummaryTitle">Recebemos os dados abaixo:</h3>
      <div id="submittedSummaryTotal" class="summary-total"></div>
      <ul id="submittedSummaryList" class="summary-list"></ul>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:3000";
    let stayId = "";
    let guestIndex = 0;
    let stayLoaded = false;
    let isSubmitting = false;
    let submissionCompleted = false;
    let currentStayData = null;
    let existingGuests = [];
    let existingGuestCount = 0;

    function getStayIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("stay") || "";
    }

    function onlyDigits(value) {
      return String(value || "").replace(/\D/g, "");
    }

    function formatCPF(value) {
      const digits = onlyDigits(value).slice(0, 11);
      return digits
        .replace(/^(\d{3})(\d)/, "$1.$2")
        .replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3")
        .replace(/\.(\d{3})(\d)/, ".$1-$2");
    }

    function formatPhone(value) {
      const digits = onlyDigits(value).slice(0, 11);

      if (digits.length <= 10) {
        return digits
          .replace(/^(\d{2})(\d)/, "($1) $2")
          .replace(/(\d{4})(\d)/, "$1-$2");
      }

      return digits
        .replace(/^(\d{2})(\d)/, "($1) $2")
        .replace(/(\d{5})(\d)/, "$1-$2");
    }

    function setStatus(message, tone) {
      const status = document.getElementById("status");
      status.textContent = message || "";
      status.style.color =
        tone === "error" ? "#b42318" :
        tone === "success" ? "#18794e" :
        tone === "warning" ? "#9a6700" :
        "#555";
    }

    function setStayInfo(message, tone) {
      const stayInfo = document.getElementById("stayInfo");
      stayInfo.textContent = message || "";
      stayInfo.style.color =
        tone === "error" ? "#b42318" :
        tone === "success" ? "#18794e" :
        tone === "warning" ? "#9a6700" :
        "#222";
    }

    function renderStayLoadedInfo(stay = currentStayData) {
      if (!stay) return;

      document.getElementById("stayInfo").innerHTML = `
        <strong>Stay:</strong> ${stay.id}<br>
        <strong>Reserva:</strong> ${stay.reservation_id || "-"}<br>
        <strong>Suíte:</strong> ${stay.sub_reservation_id || "-"}
      `;
      document.getElementById("stayInfo").style.color = "#222";
    }

    function updateActionButtons() {
      const addGuestButton = document.getElementById("addGuestBtn");
      const submitButton = document.getElementById("submitBtn");

      addGuestButton.disabled = !stayLoaded || isSubmitting || submissionCompleted;
      submitButton.disabled = !stayLoaded || isSubmitting || submissionCompleted;
    }

    function clearSubmittedSummary() {
      document.getElementById("submittedSummary").style.display = "none";
      document.getElementById("submittedSummaryTitle").textContent = "Recebemos os dados abaixo:";
      document.getElementById("submittedSummaryTotal").textContent = "";
      document.getElementById("submittedSummaryList").innerHTML = "";
    }

    function renderSubmittedSummary(result) {
      const container = document.getElementById("submittedSummary");
      const title = document.getElementById("submittedSummaryTitle");
      const total = document.getElementById("submittedSummaryTotal");
      const list = document.getElementById("submittedSummaryList");
      const successfulGuests = result.successfulGuests || [];
      const failedGuests = result.failedGuests || [];

      if (result.mode === "success") {
        title.textContent = "Recebemos os dados abaixo:";
        total.textContent = `Total de hóspedes enviados: ${successfulGuests.length}`;
      } else if (result.mode === "partial") {
        title.textContent = "Resultado parcial desta tentativa";
        total.textContent = `${successfulGuests.length} hóspede(s) enviado(s) com sucesso e ${failedGuests.length} não enviado(s).`;
      } else {
        title.textContent = "Nenhum hóspede foi enviado nesta tentativa";
        total.textContent = `${failedGuests.length} hóspede(s) não enviado(s).`;
      }

      list.innerHTML = "";

      successfulGuests.forEach((guest) => {
        const item = document.createElement("li");
        item.textContent = `${guest.full_name} - ${guest.is_main_guest ? "Titular" : "Acompanhante"} - enviado com sucesso`;
        list.appendChild(item);
      });

      failedGuests.forEach((guest) => {
        const item = document.createElement("li");
        item.textContent = `${guest.full_name} - ${guest.is_main_guest ? "Titular" : "Acompanhante"} - não enviado: ${guest.reason}`;
        list.appendChild(item);
      });

      container.style.display = "block";
    }

    function createGuestCard(defaultRole) {
      if (!stayLoaded || submissionCompleted) {
        return;
      }

      guestIndex += 1;
      const card = document.createElement("div");
      card.className = "guest-box";
      card.dataset.guestIndex = String(guestIndex);

      card.innerHTML = `
        <h3>Hóspede ${guestIndex}</h3>

        <div class="field">
          <label for="guest_${guestIndex}_full_name">Nome completo</label>
          <input id="guest_${guestIndex}_full_name" placeholder="Nome completo">
        </div>

        <div class="field">
          <label for="guest_${guestIndex}_cpf">CPF</label>
          <input id="guest_${guestIndex}_cpf" placeholder="000.000.000-00" maxlength="14">
        </div>

        <div class="field">
          <label for="guest_${guestIndex}_email">E-mail</label>
          <input id="guest_${guestIndex}_email" type="email" placeholder="email@exemplo.com">
        </div>

        <div class="field">
          <label for="guest_${guestIndex}_phone">Telefone</label>
          <input id="guest_${guestIndex}_phone" placeholder="(12) 99999-9999" maxlength="15">
        </div>

        <div class="field">
          <label for="guest_${guestIndex}_role">Tipo do hóspede</label>
          <select id="guest_${guestIndex}_role">
            <option value="1">Titular</option>
            <option value="0">Acompanhante</option>
          </select>
          <div class="field-note">Pelo menos um hóspede deve ser titular.</div>
        </div>

        <div class="actions">
          <button class="danger-btn remove-guest-btn" type="button">Remover hóspede</button>
        </div>
      `;

      card.querySelector(`#guest_${guestIndex}_role`).value = defaultRole;

      card.querySelector(".remove-guest-btn").addEventListener("click", () => {
        const cards = document.querySelectorAll(".guest-box");
        if (cards.length <= 1) {
          setStatus("Mantenha pelo menos um hóspede no formulário.", "warning");
          return;
        }

        card.remove();
        setStatus("");
      });

      card.querySelector(`#guest_${guestIndex}_cpf`).addEventListener("input", (event) => {
        event.target.value = formatCPF(event.target.value);
      });

      card.querySelector(`#guest_${guestIndex}_phone`).addEventListener("input", (event) => {
        event.target.value = formatPhone(event.target.value);
      });

      document.getElementById("guestList").appendChild(card);
    }

    function collectGuests() {
      return Array.from(document.querySelectorAll(".guest-box")).map((card) => {
        const index = card.dataset.guestIndex;
        return {
          full_name: document.getElementById(`guest_${index}_full_name`).value.trim(),
          cpf: document.getElementById(`guest_${index}_cpf`).value.trim(),
          email: document.getElementById(`guest_${index}_email`).value.trim(),
          phone: document.getElementById(`guest_${index}_phone`).value.trim(),
          is_main_guest: document.getElementById(`guest_${index}_role`).value === "1" ? 1 : 0,
          is_adult: 1,
          birth_date: ""
        };
      });
    }

    function validateGuests(guests) {
      if (!guests.length) {
        return "Adicione pelo menos um hóspede.";
      }

      const mainGuestCount = guests.filter((guest) => guest.is_main_guest).length;
      const stayAlreadyHasMainGuest = existingGuests.some((guest) => guest.is_main_guest);
      if (!stayAlreadyHasMainGuest && !mainGuestCount) {
        return "Defina pelo menos um hóspede titular para esta hospedagem.";
      }

      const cpfSet = new Set();
      for (const guest of guests) {
        if (!guest.full_name) {
          return "Preencha o nome completo de todos os hóspedes.";
        }

        const cpfDigits = onlyDigits(guest.cpf);
        if (!cpfDigits) {
          return "Preencha o CPF de todos os hóspedes.";
        }

        if (cpfDigits.length !== 11) {
          return "O CPF de todos os hóspedes deve ter exatamente 11 dígitos.";
        }

        if (cpfSet.has(cpfDigits)) {
          return "Não repita o mesmo CPF em mais de um hóspede.";
        }

        cpfSet.add(cpfDigits);
      }

      return "";
    }

    async function loadStay() {
      stayId = getStayIdFromUrl();
      stayLoaded = false;
      submissionCompleted = false;
      isSubmitting = false;
      currentStayData = null;
      existingGuests = [];
      existingGuestCount = 0;
      document.getElementById("guestList").innerHTML = "";
      clearSubmittedSummary();
      setStayInfo("Carregando dados da stay...", "info");
      setStatus("Carregando stay...", "info");
      updateActionButtons();

      if (!stayId) {
        setStayInfo("Este link de pré-check-in está incompleto. Peça à recepção para enviar o link correto da sua hospedagem.", "error");
        setStatus("Não foi possível abrir o pré-check-in porque o link está sem a identificação da stay.", "error");
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/stays/${stayId}`);
        const contentType = response.headers.get("content-type") || "";
        const data = contentType.includes("application/json") ? await response.json() : {};

        if (!response.ok) {
          setStayInfo(data.error || "Não encontramos esta hospedagem. Confirme o link enviado pela recepção.");
          setStatus("Não foi possível carregar os dados da stay. Verifique o link recebido e tente novamente.", "error");
          return;
        }

        stayLoaded = true;
        currentStayData = data;
        renderStayLoadedInfo(data);

        try {
          const existingGuestsResponse = await fetch(`${API_BASE}/stays/${stayId}/guests`);
          if (existingGuestsResponse.ok) {
            const rows = await existingGuestsResponse.json();
            existingGuests = rows;
            existingGuestCount = rows.length;
          } else {
            existingGuests = [];
            existingGuestCount = 0;
          }
        } catch (guestLoadError) {
          console.error(guestLoadError);
          existingGuests = [];
          existingGuestCount = 0;
        }

        document.getElementById("guestList").innerHTML = "";
        guestIndex = 0;
        createGuestCard("1");

        if (existingGuestCount > 0) {
          setStatus(
            `Esta hospedagem já possui ${existingGuestCount} hóspede(s) registrado(s). Os dados já enviados não aparecem preenchidos nesta tela. Se já existir hóspede titular, este link pode ser usado para enviar apenas acompanhantes.`,
            "warning"
          );
        } else {
          setStatus("Stay carregada com sucesso. Preencha os hóspedes e envie o pré-check-in.", "success");
        }

        updateActionButtons();
      } catch (error) {
        console.error(error);
        setStayInfo("Não foi possível carregar sua hospedagem agora. Tente novamente em instantes ou fale com a recepção.");
        setStatus("Erro de comunicação ao carregar a stay.", "error");
      }

      updateActionButtons();
    }

    async function submitPrecheckin() {
      if (!stayLoaded || !stayId) {
        setStatus("Stay inválida para envio.", "error");
        return;
      }

      if (isSubmitting || submissionCompleted) {
        return;
      }

      const guests = collectGuests();
      clearSubmittedSummary();
      setStayInfo("Processando o pré-check-in. Aguarde um momento.", "info");
      const validationError = validateGuests(guests);
      if (validationError) {
        renderStayLoadedInfo();
        setStatus(validationError, "error");
        return;
      }

      const submitButton = document.getElementById("submitBtn");
      isSubmitting = true;
      updateActionButtons();
      setStatus("Enviando pré-check-in... Aguarde um momento.", "info");

      try {
        const successfulGuests = [];
        const failedGuests = [];

        for (const guest of guests) {
          const response = await fetch(`${API_BASE}/guests`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              stay_id: stayId,
              full_name: guest.full_name,
              cpf: guest.cpf,
              email: guest.email,
              phone: guest.phone,
              birth_date: guest.birth_date,
              is_adult: guest.is_adult,
              is_main_guest: guest.is_main_guest
            })
          });

          const data = await response.json();

          if (!response.ok) {
            failedGuests.push({
              ...guest,
              reason: data.error || "Não foi possível salvar este hóspede."
            });
            continue;
          }

          successfulGuests.push(guest);
          existingGuests.push({
            ...guest,
            id: data.guest_id || null
          });
          existingGuestCount = existingGuests.length;
        }

        if (successfulGuests.length === guests.length) {
          submissionCompleted = true;
          document.getElementById("guestList").querySelectorAll("input, select, button").forEach((field) => {
            field.disabled = true;
          });
          renderSubmittedSummary({
            mode: "success",
            successfulGuests,
            failedGuests
          });
          setStayInfo("Pré-check-in recebido com sucesso. Nossa equipe já pode dar continuidade ao seu atendimento.", "success");
          setStatus("Pré-check-in enviado com sucesso. Obrigado! Seus dados foram recebidos.", "success");
          return;
        }

        if (!successfulGuests.length) {
          renderSubmittedSummary({
            mode: "error",
            successfulGuests,
            failedGuests
          });
          setStayInfo(
            "Não foi possível concluir o pré-check-in. Revise os dados informados e tente novamente.",
            "error"
          );
          setStatus("Nenhum hóspede foi enviado nesta tentativa.", "error");
          return;
        }

        renderSubmittedSummary({
          mode: "partial",
          successfulGuests,
          failedGuests
        });
        setStayInfo(
          "Recebemos parte do pré-check-in. Revise os hóspedes não enviados e tente novamente para concluir.",
          "warning"
        );
        setStatus(
          `${successfulGuests.length} hóspede(s) enviado(s) com sucesso e ${failedGuests.length} com pendência nesta tentativa.`,
          "warning"
        );
      } catch (error) {
        console.error(error);
        setStayInfo(
          "Não foi possível concluir o pré-check-in agora. Tente novamente em instantes ou fale com a recepção.",
          "error"
        );
        setStatus("Erro de comunicação ao enviar o pré-check-in.", "error");
      } finally {
        isSubmitting = false;
        updateActionButtons();
      }
    }

    document.getElementById("addGuestBtn").addEventListener("click", () => {
      createGuestCard("0");
      setStatus("");
    });

    document.getElementById("submitBtn").addEventListener("click", submitPrecheckin);

    loadStay();
  </script>
</body>
</html>
